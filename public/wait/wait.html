<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Katja birthday quiz</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Stack+Sans+Headline:wght@200..700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <style>
        h3 {
            margin: 10px;
        }
    </style>
</head>
<body style="height: 100vh; display: grid; grid-template-rows: min-content auto; overflow: hidden">
<div>

</div>
<div style="display: grid;  justify-content: center; align-items: center">
    <div style="width: fit-content; height: fit-content; display: grid; justify-items: center">
        <h3 id="title">You're all set!</h3>
        <h3>Waiting for host</h3>
        <img style="width: 200px; height: 200px" src="img/loading.gif">
    </div>
</div>
<script src="await.js"></script>
<script src="extractCookies.js"></script>
<script>
    const title = document.getElementById("title");
    let name = getCookie("name");

    const waitReason = getCookie("wait");

    switch (waitReason){
        case "start":{
            title.innerText="You're all set, "+name;
            sendAwait("waitStart",(message)=>{
                if (message==="start"){
                    window.open("/quiz", "_self");
                }
            });
            break;
        }
        case "answer":{
            title.innerText="Let's see if you're right";
            sendAwait("waitAnswer",(message)=>{
                if (message==="proceed"){
                    window.open("/leaderboard", "_self");
                } else if (message==="podium"){
                    window.open("/podium", "_self");
                }
            });
        }
    }
</script>
</body>
</html>
